{# templates/components/_request_nav.html #}
{% set tab = active_tab or "" %}

<nav class="req-nav" style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
  <a class="btn {% if tab == 'snapshot' %}btn-primary{% endif %}"
     href="{{ url_for('requests.request_detail', request_id=req.id) }}">
    Snapshot
  </a>

  <a class="btn {% if tab == 'lines' %}btn-primary{% endif %}"
     href="{{ url_for('requests.edit_request_draft', request_id=req.id) }}">
    Draft / Lines
  </a>

  {# Revision snapshot is per revision; if you have current_revision_id use it #}
  {% if req.current_revision_id %}
    <a class="btn {% if tab == 'revision' %}btn-primary{% endif %}"
       href="{{ url_for('lines.revision_snapshot', revision_id=req.current_revision_id) }}">
      Current Revision
    </a>
  {% endif %}
</nav>
