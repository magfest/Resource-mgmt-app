<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dev Login (View As)</title>
</head>
<body style="font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0;">
  {% include "_dev_view_as_header.html" %}

  <div style="padding: 16px; max-width: 720px;">
    <h1 style="margin: 0 0 12px 0;">Dev Login (View As)</h1>

    <form method="post" action="{{ url_for('dev_login_post') }}" style="display:flex; gap:12px; align-items:center;">
      <label for="user_id"><strong>Active user:</strong></label>
      <select name="user_id" id="user_id" style="padding: 6px 8px;">
        {% for u in users %}
          <option value="{{ u.id }}" {% if u.id == current_user_id %}selected{% endif %}>
            {{ u.display_name }} ({{ u.id }})
          </option>
        {% endfor %}
      </select>
      <button type="submit" style="padding: 6px 10px;">Switch</button>
    </form>

    <hr style="margin: 16px 0;">

    <p style="color:#444; margin: 0;">
      This is a demo-only “view as” switch using Flask session. No real auth yet.
    </p>
  </div>
</body>
</html>
